<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTwin AI — Streaming Analysis Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .input-section {
            padding: 30px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .progress-section {
            padding: 30px;
            display: none;
        }
        
        .progress-section.active {
            display: block;
        }
        
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e5e7eb;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            padding-left: 20px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #9ca3af;
            border: 2px solid white;
            box-shadow: 0 0 0 2px #e5e7eb;
        }
        
        .timeline-item.active::before {
            background: #667eea;
            box-shadow: 0 0 0 2px #667eea, 0 0 0 4px rgba(102, 126, 234, 0.2);
        }
        
        .timeline-item.complete::before {
            background: #10b981;
            box-shadow: 0 0 0 2px #10b981;
        }
        
        .timeline-item.error::before {
            background: #ef4444;
            box-shadow: 0 0 0 2px #ef4444;
        }
        
        .timeline-status {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        
        .timeline-message {
            font-size: 16px;
            color: #111827;
            font-weight: 500;
        }
        
        .llm-output {
            background: #f9fafb;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #374151;
        }
        
        .elapsed {
            text-align: center;
            padding: 20px;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
            color: #6b7280;
            font-size: 14px;
        }
        
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 MediTwin AI</h1>
            <p>Multi-Agent Clinical Decision Support — Real-Time Streaming Demo</p>
        </div>
        
        <div class="input-section" id="inputSection">
            <div class="form-group">
                <label for="patientId">Patient ID</label>
                <input type="text" id="patientId" value="example" placeholder="Enter FHIR Patient ID">
            </div>
            
            <div class="form-group">
                <label for="chiefComplaint">Chief Complaint</label>
                <textarea id="chiefComplaint" placeholder="Describe the patient's symptoms">Fever, productive cough, and shortness of breath for 3 days</textarea>
            </div>
            
            <button class="btn" id="analyzeBtn" onclick="startAnalysis()">
                🚀 Start Analysis
            </button>
        </div>
        
        <div class="progress-section" id="progressSection">
            <div class="timeline" id="timeline"></div>
        </div>
        
        <div class="elapsed" id="elapsed" style="display: none;"></div>
    </div>
    
    <script>
        let startTime;
        let eventSource;
        
        async function startAnalysis() {
            const patientId = document.getElementById('patientId').value;
            const chiefComplaint = document.getElementById('chiefComplaint').value;
            
            if (!patientId || !chiefComplaint) {
                alert('Please fill in all fields');
                return;
            }
            
            // Reset UI
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('timeline').innerHTML = '';
            document.getElementById('elapsed').style.display = 'none';
            startTime = Date.now();
            
            // Build request
            const requestBody = {
                patient_id: patientId,
                chief_complaint: chiefComplaint,
                fhir_base_url: 'https://hapi.fhir.org/baseR4'
            };
            
            try {
                // Use EventSource for SSE (only GET supported by EventSource)
                // So we'll use fetch with streaming instead
                const response = await fetch('http://localhost:8020/analyze/stream?stream_mode=messages,updates,custom', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let buffer = '';
                let currentEvent = null;
                let currentData = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    // Process complete lines
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer
                    
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            currentEvent = line.substring(7).trim();
                        } else if (line.startsWith('data: ')) {
                            currentData = line.substring(6).trim();
                        } else if (line === '' && currentEvent && currentData) {
                            // Complete event
                            handleEvent(currentEvent, JSON.parse(currentData));
                            currentEvent = null;
                            currentData = '';
                        }
                    }
                }
                
                showElapsed();
                
            } catch (error) {
                console.error('Streaming error:', error);
                addTimelineItem('error', `Error: ${error.message}`, true);
            } finally {
                document.getElementById('analyzeBtn').disabled = false;
            }
        }
        
        function handleEvent(eventType, data) {
            if (eventType === 'message') {
                // LLM token streaming
                appendToLLMOutput(data.content, data.node);
            } else if (eventType === 'update') {
                // Agent completion
                addTimelineItem(data.node, data.summary || 'Complete', true);
            } else if (eventType === 'status') {
                // Custom status message
                const isError = data.error || false;
                addTimelineItem('status', data.status, false, isError);
            } else if (eventType === 'final') {
                // Analysis complete
                addTimelineItem('final', `✅ ${data.message || 'Analysis complete'}`, true);
            } else if (eventType === 'error') {
                // Error occurred
                addTimelineItem('error', `❌ ${data.error}`, true);
            }
        }
        
        function addTimelineItem(id, message, complete = false, isError = false) {
            const timeline = document.getElementById('timeline');
            
            let item = document.getElementById(`timeline-${id}`);
            if (!item) {
                item = document.createElement('div');
                item.id = `timeline-${id}`;
                item.className = 'timeline-item';
                timeline.appendChild(item);
            }
            
            if (complete) {
                item.classList.add('complete');
            }
            if (isError) {
                item.classList.add('error');
            } else {
                item.classList.add('active');
            }
            
            const timestamp = new Date().toLocaleTimeString();
            item.innerHTML = `
                <div class="timeline-status">${timestamp}</div>
                <div class="timeline-message">${message}</div>
            `;
            
            // Scroll to bottom
            item.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        
        let llmOutputDiv = null;
        
        function appendToLLMOutput(content, node) {
            if (!llmOutputDiv) {
                llmOutputDiv = document.createElement('div');
                llmOutputDiv.className = 'llm-output';
                llmOutputDiv.innerHTML = `<strong>🤖 ${node}:</strong> `;
                document.getElementById('timeline').appendChild(llmOutputDiv);
            }
            
            llmOutputDiv.innerHTML += content;
            llmOutputDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        
        function showElapsed() {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            const elapsedDiv = document.getElementById('elapsed');
            elapsedDiv.textContent = `⏱️  Total analysis time: ${elapsed} seconds`;
            elapsedDiv.style.display = 'block';
        }
    </script>
</body>
</html>
