version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# MediTwin AI — Docker Compose
#
# All build contexts are set to "." (project root) so Dockerfiles can
# reference shared/, requirements.txt, and agent code via absolute paths
# from root. This is the standard monorepo pattern for Docker.
#
# Usage:
#   cp .env.example .env          # fill in OPENAI_API_KEY
#   docker-compose up --build
#
# One-time setup (run before first docker-compose up):
#   docker-compose run --rm diagnosis python /app/knowledge_base/ingest.py
#   docker-compose run --rm digital-twin python /app/agents/digital_twin/train_models.py
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: meditwin-redis
    ports:
      - "6379:6379"
    networks:
      - meditwin-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: meditwin-chromadb
    ports:
      - "8008:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    networks:
      - meditwin-network
    restart: unless-stopped

  # ── Agent 1: Patient Context Agent (port 8001) ──────────────────────────────

  patient-context:
    build:
      context: .
      dockerfile: agents/patient_context/Dockerfile
    container_name: meditwin-patient-context
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FHIR_BASE_URL=https://hapi.fhir.org/baseR4
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - meditwin-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
    #   interval: 60s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  # ── Agent 2: Diagnosis Agent (port 8002) ─────────────────────────────────────

  diagnosis:
    build:
      context: .
      dockerfile: agents/diagnosis/Dockerfile
    container_name: meditwin-diagnosis
    ports:
      - "8002:8002"
    environment:
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - chromadb
    networks:
      - meditwin-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
    #   interval: 60s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  # ── Agent 3: Lab Analysis Agent (port 8003) ───────────────────────────────────

  lab-analysis:
    build:
      context: .
      dockerfile: agents/lab_analysis/Dockerfile
    container_name: meditwin-lab-analysis
    ports:
      - "8003:8003"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - meditwin-network
    # healthcheck:
      # test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      # interval: 60s
      # timeout: 5s
      # retries: 5
    restart: unless-stopped

  # ── Agent 4: Drug Safety MCP (port 8004) ──────────────────────────────────────

  drug-safety:
    build:
      context: .
      dockerfile: agents/drug_safety/Dockerfile
    container_name: meditwin-drug-safety
    ports:
      - "8004:8004"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - meditwin-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
    #   interval: 60s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  # ── Agent 5: Imaging Triage Agent (port 8005) ─────────────────────────────────

  imaging-triage:
    build:
      context: .
      dockerfile: agents/imaging_triage/Dockerfile
    container_name: meditwin-imaging-triage
    ports:
      - "8005:8005"
    networks:
      - meditwin-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
    #   interval: 60s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  # ── Agent 6: Digital Twin Agent (port 8006) ───────────────────────────────────

  digital-twin:
    build:
      context: .
      dockerfile: agents/digital_twin/Dockerfile
    container_name: meditwin-digital-twin
    ports:
      - "8006:8006"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - meditwin-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
    #   interval: 60s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  # ── Agent 7: Consensus + Escalation Agent (port 8007) ────────────────────────

  consensus:
    build:
      context: .
      dockerfile: agents/consensus/Dockerfile
    container_name: meditwin-consensus
    ports:
      - "8007:8007"
    environment:
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - chromadb
    networks:
      - meditwin-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
    #   interval: 60s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  # ── Agent 8: Explanation Agent (port 8009) ────────────────────────────────────

  explanation:
    build:
      context: .
      dockerfile: agents/explanation/Dockerfile
    container_name: meditwin-explanation
    ports:
      - "8009:8009"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - meditwin-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
    #   interval: 60s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  # ── Agent 9: Orchestrator — Main Entry Point (port 8000) ──────────────────────

  orchestrator:
      build:
        context: .
        dockerfile: orchestrator/Dockerfile
      container_name: meditwin-orchestrator
      ports:
        - "8000:8000"
      environment:
        - PATIENT_CONTEXT_URL=http://patient-context:8001
        - DIAGNOSIS_URL=http://diagnosis:8002
        - LAB_ANALYSIS_URL=http://lab-analysis:8003
        - DRUG_SAFETY_URL=http://drug-safety:8004
        - IMAGING_TRIAGE_URL=http://imaging-triage:8005
        - DIGITAL_TWIN_URL=http://digital-twin:8006
        - CONSENSUS_URL=http://consensus:8007
        - EXPLANATION_URL=http://explanation:8009
        - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      depends_on:
        - patient-context
        - diagnosis
        - lab-analysis
        - drug-safety
        - imaging-triage
        - digital-twin
        - consensus
        - explanation
      networks:
        - meditwin-network
      # healthcheck:
      #   test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      #   interval: 60s
      #   timeout: 5s
      #   retries: 5
      restart: unless-stopped

networks:
  meditwin-network:
    driver: bridge

volumes:
  chromadb-data: